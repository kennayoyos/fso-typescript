name: Health app E2E Tests

on:
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install healthapp dependencies
        working-directory: ./healthapp
        run: npm install

      - name: Lint healthapp
        working-directory: ./healthapp
        run: npm run lint

      - name: Start healthapp server
        working-directory: ./healthapp
        run: |
          npm start > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for healthapp readiness
        working-directory: ./healthapp
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/hello > /dev/null; then
              echo "Server is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start in 60s"
          cat server.log || true
          exit 1

      - name: Install test dependencies
        working-directory: ./healthapp-tests
        run: npm install

      - name: Install Playwright browsers
        working-directory: ./healthapp-tests
        env:
          DEBUG: pw:install,pw:browser*
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: ./healthapp-tests
        run: npm test

      - name: Upload test report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-report
          path: healthapp-tests/playwright-report/
          retention-days: 30

      - name: Stop healthapp server
        if: always()
        working-directory: ./healthapp
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi
